<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魚樂匯 | 特價選單</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.95;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .product-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0,0,0,0.15);
        }

        .product-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;
            background: #f0f0f0;
        }

        .product-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }

        .product-price {
            font-size: 1.5rem;
            color: #e53e3e;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .product-unit {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 10px;
        }

        .product-description {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 15px;
            min-height: 40px;
        }

        .quantity-control {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
        }

        .quantity-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: #667eea;
            color: white;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .quantity-btn:hover {
            background: #5568d3;
        }

        .quantity-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .quantity-input {
            width: 60px;
            text-align: center;
            font-size: 1.1rem;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            padding: 8px;
        }

        .cart-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #e53e3e;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(229, 62, 62, 0.4);
            transition: all 0.2s;
            z-index: 1000;
        }

        .cart-button:hover {
            background: #c53030;
            transform: scale(1.05);
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #fff;
            color: #e53e3e;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            font-size: 1.5rem;
            color: #333;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #666;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-name {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .cart-item-details {
            font-size: 0.9rem;
            color: #666;
        }

        .cart-item-price {
            font-size: 1.1rem;
            font-weight: bold;
            color: #e53e3e;
        }

        .cart-total {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #333;
            font-size: 1.3rem;
            font-weight: bold;
            text-align: right;
        }

        .checkout-btn {
            width: 100%;
            padding: 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.2s;
        }

        .checkout-btn:hover {
            background: #5568d3;
        }

        .empty-cart {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .order-summary {
            background: #f7fafc;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .order-summary pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: monospace;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .copy-btn {
            width: 100%;
            padding: 12px;
            background: #48bb78;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }

        .copy-btn:hover {
            background: #38a169;
        }

        @media (max-width: 768px) {
            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 15px;
            }

            .header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>

        // 初始化

            renderProducts();
            updateCartCount();

        // 渲染商品列表
        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = products.map(product => `
                <div class="product-card">
                    <img src="${product.image}" alt="${product.name}" class="product-image"
                         onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%27200%27 height=%27200%27%3E%3Crect width=%27200%27 height=%27200%27 fill=%27%23f0f0f0%27/%3E%3Ctext x=%2750%25%27 y=%2750%25%27 text-anchor=%27middle%27 dy=%27.3em%27 fill=%27%23999%27 font-size=%2718%27%3E無圖片%3C/text%3E%3C/svg%3E'">
                    <div class="product-name">${product.name}</div>
                    <div class="product-price">NT$ ${product.price.toLocaleString()}</div>
                    <div class="product-unit">單位: ${product.unit}</div>
                    <div class="product-description">${product.description}</div>
                    <div class="quantity-control">
                        <button class="quantity-btn" onclick="decreaseQuantity(${product.id})">−</button>
                        <input type="number" class="quantity-input" id="qty-${product.id}"
                               value="0" min="0" onchange="updateQuantity(${product.id}, this.value)">
                        <button class="quantity-btn" onclick="increaseQuantity(${product.id})">+</button>
                    </div>
                </div>
            `).join('');
        }

        // 增加數量
        function increaseQuantity(productId) {
            const input = document.getElementById('qty-' + productId);
            input.value = parseInt(input.value) + 1;
            updateQuantity(productId, input.value);
        }

        // 減少數量
        function decreaseQuantity(productId) {
            const input = document.getElementById('qty-' + productId);
            if (parseInt(input.value) > 0) {
                input.value = parseInt(input.value) - 1;
                updateQuantity(productId, input.value);
            }
        }

        // 更新數量
        function updateQuantity(productId, quantity) {
            quantity = parseInt(quantity) || 0;
            if (quantity > 0) {
                cart[productId] = quantity;
            } else {
                delete cart[productId];
            }
            updateCartCount();
        }

        // 更新購物車數量
        function updateCartCount() {
            const count = Object.values(cart).reduce((sum, qty) => sum + qty, 0);
            document.getElementById('cartCount').textContent = count;
        }

        // 開啟購物車
        function openCart() {
            const modal = document.getElementById('cartModal');
            const cartItems = document.getElementById('cartItems');

            if (Object.keys(cart).length === 0) {
                cartItems.innerHTML = '<div class="empty-cart">購物車是空的</div>';
            } else {
                const items = Object.entries(cart).map(([productId, qty]) => {
                    const product = products.find(p => p.id == productId);
                    const subtotal = product.price * qty;
                    return {
                        product,
                        qty,
                        subtotal
                    };
                });

                const total = items.reduce((sum, item) => sum + item.subtotal, 0);

                cartItems.innerHTML = `
                    ${items.map(item => `
                        <div class="cart-item">
                            <div class="cart-item-info">
                                <div class="cart-item-name">${item.product.name}</div>
                                <div class="cart-item-details">${item.qty} ${item.product.unit} × NT$ ${item.product.price.toLocaleString()}</div>
                            </div>
                            <div class="cart-item-price">NT$ ${item.subtotal.toLocaleString()}</div>
                        </div>
                    `).join('')}
                    <div class="cart-total">
                        總計: NT$ ${total.toLocaleString()}
                    </div>
                    <button class="checkout-btn" onclick="checkout()">確認訂單</button>
                `;
            }

            modal.classList.add('active');
        }

        // 關閉購物車
        function closeCart() {
            document.getElementById('cartModal').classList.remove('active');
        }

        // 結帳
        function checkout() {
            const items = Object.entries(cart).map(([productId, qty]) => {
                const product = products.find(p => p.id == productId);
                return {
                    name: product.name,
                    qty,
                    unit: product.unit,
                    price: product.price,
                    subtotal: product.price * qty
                };
            });

            const total = items.reduce((sum, item) => sum + item.subtotal, 0);

            const orderText = `
🐟 魚樂匯訂單

───────────────────
${items.map(item =>
    `${item.name}\n${item.qty} ${item.unit} × ${item.price} = ${item.subtotal}元`
).join('\n\n')}
───────────────────

💰 總金額: NT$ ${total.toLocaleString()}

📅 訂單時間: ${new Date().toLocaleString('zh-TW')}
            `.trim();

            const cartItems = document.getElementById('cartItems');
            cartItems.innerHTML = `
                <div class="order-summary">
                    <h3>📋 訂單明細</h3>
                    <pre>${orderText}</pre>
                    <button class="copy-btn" onclick="copyOrder(\`${orderText}\`)">📋 複製訂單</button>
                    <button class="checkout-btn" onclick="sendToLine(\`${orderText}\`)">💬 傳送到 LINE</button>
                </div>
            `;
        }

        // 複製訂單
        function copyOrder(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('✅ 訂單已複製！\n請貼到 LINE 傳給我們');
            });
        }

        // 傳送到 LINE
        function sendToLine(text) {
            const lineUrl = `https://line.me/R/msg/text/?${encodeURIComponent(text)}`;
            window.open(lineUrl, '_blank');
        }

        // 初始化
        init();
    </script>
</body>
</html>
