            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 20px; }
        .header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        
        /* 分類按鈕 */
        .category-nav {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 30px;
        }
        .category-btn {
            background: white;
            border: 2px solid white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            color: #667eea;
        }
        .category-btn:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }
        .category-btn.active {
            background: #667eea;
            color: white;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 100px;
        }
        .product-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .product-card.hidden { display: none; }
        
        /* 商品圖片 */
        .product-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #f0f0f0 0%, #e0e0e0 100%);
            border-radius: 8px;
            margin-bottom: 15px;
            object-fit: cover;
            transition: transform 0.2s, opacity 0.3s;
        }
        .product-image:hover {
            transform: scale(1.02);
        }
        .product-image.loading {
            opacity: 0.5;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.8; }
        }
        .product-image.no-image {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 0.9rem;
            background: linear-gradient(135deg, #f0f0f0 0%, #e0e0e0 100%);
        }
        .image-placeholder {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #f0f0f0 0%, #e0e0e0 100%);
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 0.9rem;
        }
        
        .product-name { 
            font-size: 1.3rem; 
            font-weight: bold; 
            margin-bottom: 8px;
            color: #333;
        }
        .product-meta { 
            font-size: 0.9rem; 
            color: #666; 
            margin-bottom: 15px;
        }
        
        /* 階梯選項 */
        .tier-option {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px;
            margin-bottom: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tier-option:hover { 
            border-color: #667eea; 
            background: #f7fafc;
            transform: translateX(4px);
        }
        .tier-option.selected { 
            border-color: #667eea; 
            background: #eef2ff;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.2);
        }
        
        .tier-left { flex: 1; }
        .tier-label { 
            font-weight: bold;
            font-size: 1.1rem;
            color: #333;
            margin-bottom: 4px;
        }
        .tier-quantity {
            font-size: 0.85rem;
            color: #666;
        }
        
        .tier-right { text-align: right; }
        .tier-total-price {
            font-size: 1.4rem;
            font-weight: bold;
            color: #e53e3e;
            margin-bottom: 2px;
        }
        .tier-unit-price {
            font-size: 0.8rem;
            color: #999;
        }
        
        .add-to-cart-btn {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.05rem;
            cursor: pointer;
            margin-top: 12px;
            transition: all 0.2s;
        }
        .add-to-cart-btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }
        .add-to-cart-btn:disabled { 
            background: #cbd5e0; 
            cursor: not-allowed;
            transform: none;
        }
        
        /* 購物車按鈕 */
        .cart-button {
            position: fixed;

            right: 30px;
            background: #e53e3e;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 16px 32px;
            font-size: 1.15rem;
            font-weight: bold;

            box-shadow: 0 6px 20px rgba(229, 62, 62, 0.4);
            transition: all 0.2s;
        }
        .cart-button:hover {
            background: #c53030;
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(229, 62, 62, 0.5);
        }
        .cart-count {

            top: -8px;
            right: -8px;
            background: #fff;
            color: #e53e3e;
            min-width: 28px;
            height: 28px;

            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            padding: 0 6px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.75);
            z-index: 2000;
            align-items: center;
            justify-content: center;

        .modal.active { display: flex; }

            background: white;
            border-radius: 16px;
            padding: 30px;
            max-width: 600px;
            width: 90%;

            color: #666;
            line-height: 1;

            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .form-group textarea {
            resize: vertical;
            min-height: 60px;
        }

            width: 100%;
            padding: 16px;
            background: #48bb78;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.1rem;

            margin-top: 20px;

            box-shadow: 0 4px 12px rgba(72, 187, 120, 0.3);
        }

            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }
        .line-btn {
            background: #06c755;
        }
        .line-btn:hover {
            background: #05b04b;
        }

            padding: 60px 20px;
            color: #999;
            font-size: 1.1rem;

            margin-bottom: 16px;
            color: #333;
        }
        .order-summary pre {

            font-family: "SF Mono", Consolas, monospace;
            font-size: 0.95rem;
            line-height: 1.8;
            color: #333;
        }
        
        @media (max-width: 768px) {
            .products-grid {
                grid-template-columns: 1fr;

                font-size: 0.9rem;
            }

        let currentCategory = 'all';

        // 初始化
        function init() {
            renderCategories();
            renderProducts();
        }

        // 渲染分類按鈕
        function renderCategories() {
            const categories = new Set();
            products.forEach(p => categories.add(p.category));
            
            const nav = document.getElementById('categoryNav');
            nav.innerHTML = `
                <button class="category-btn active" onclick="filterCategory('all')">全部商品</button>
                ${Array.from(categories).sort().map(cat => 
                    `<button class="category-btn" onclick="filterCategory('${cat}')">${cat}</button>`
                ).join('')}
            `;
        }

        // 篩選分類
        function filterCategory(category) {
            currentCategory = category;
            
            // 更新按鈕狀態
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // 顯示/隱藏商品
            document.querySelectorAll('.product-card').forEach((card, idx) => {
                const product = products[idx];
                if (category === 'all' || product.category === category) {
                    card.classList.remove('hidden');
                } else {
                    card.classList.add('hidden');
                }
            });
        }

        // 渲染商品列表
        function renderProducts() {
            document.getElementById('productsGrid').innerHTML = products.map(p => {
                // 嘗試多種圖片格式: 原名.jpg, 原名1.jpg, 原名1.JPG, 原名.png
                const imageVariants = [
                    `images/${p.name}.jpg`,
                    `images/${p.name}1.jpg`,
                    `images/${p.name}1.JPG`,
                    `images/${p.name}.JPG`,
                    `images/${p.name}.png`,
                    `images/${p.name}1.png`
                ];
                const imagePath = imageVariants[0]; // 預設第一個

                return `
                <div class="product-card" data-category="${p.category}">
                    <img data-src="${imagePath}"
                         data-variants='${JSON.stringify(imageVariants)}'
                         alt="${p.name}"
                         class="product-image loading"
                         loading="lazy"
                         onerror="tryNextImageVariant(this)">
                    <div class="product-name">${p.name}</div>
                    <div class="product-meta">📏 ${p.size} | 🔖 ${p.category}</div>
                    <div class="tier-options">
                        ${p.tiers.map((t, i) => {
                            const totalPrice = t.moq * t.price;
                            const unitPrice = t.price;
                            return `
                            <div class="tier-option" onclick="selectTier(${p.id}, ${i})" id="tier-${p.id}-${i}">
                                <div class="tier-left">
                                    <div class="tier-label">${String.fromCharCode(65 + i)}組</div>
                                    <div class="tier-quantity">最低購買量：${t.moq} ${p.unit}</div>
                                </div>
                                <div class="tier-right">
                                    <div class="tier-total-price">NT$ ${totalPrice.toLocaleString()}</div>
                                    <div class="tier-unit-price">平均 $${unitPrice}/${p.unit}</div>
                                </div>
                            </div>
                        `}).join('')}
                    </div>
                    <button class="add-to-cart-btn" id="btn-${p.id}" onclick="addToCart(${p.id})" disabled>
                        請選擇組別
                    </button>
                </div>
            `}).join('');

            // 懶加載圖片
            lazyLoadImages();
        }

        // 嘗試載入不同格式的圖片
        function tryNextImageVariant(img) {
            if (!img.dataset.variants) {
                // 沒有備用圖片，顯示無圖片
                img.className = 'product-image no-image';
                img.removeAttribute('src');
                img.textContent = '🐟 無圖片';
                return;
            }

            const variants = JSON.parse(img.dataset.variants);
            let currentIndex = img.dataset.variantIndex ? parseInt(img.dataset.variantIndex) : 0;
            currentIndex++;

            if (currentIndex < variants.length) {
                // 嘗試下一個圖片格式
                img.dataset.variantIndex = currentIndex;
                img.src = variants[currentIndex];
            } else {
                // 所有格式都失敗，顯示無圖片
                img.onerror = null;
                img.className = 'product-image no-image';
                img.removeAttribute('src');
                img.textContent = '🐟 無圖片';
            }
        }

        // 圖片懶加載
        function lazyLoadImages() {
            const images = document.querySelectorAll('img[data-src]');

            if ('IntersectionObserver' in window) {
                const imageObserver = new IntersectionObserver((entries, observer) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            const img = entry.target;
                            img.src = img.dataset.src;
                            img.removeAttribute('data-src');
                            img.classList.remove('loading');
                            observer.unobserve(img);
                        }
                    });
                });

                images.forEach(img => imageObserver.observe(img));
            } else {
                // 不支援IntersectionObserver時直接載入所有圖片
                images.forEach(img => {
                    img.src = img.dataset.src;
                    img.removeAttribute('data-src');
                    img.classList.remove('loading');
                });
            }
        }

        // 選擇階梯
        function selectTier(pid, tidx) {
            const p = products.find(x => x.id === pid);
            p.tiers.forEach((_, i) => {
                const el = document.getElementById(`tier-${pid}-${i}`);
                if (el) el.classList.remove('selected');
            });
            document.getElementById(`tier-${pid}-${tidx}`).classList.add('selected');
            const btn = document.getElementById(`btn-${pid}`);
            btn.disabled = false;
            btn.textContent = '加入購物車';
            btn.dataset.tierIdx = tidx;
        }

        // 加入購物車
        function addToCart(pid) {
            const btn = document.getElementById(`btn-${pid}`);
            const tidx = parseInt(btn.dataset.tierIdx);
            if (isNaN(tidx)) return;

            const p = products.find(x => x.id === pid);
            const t = p.tiers[tidx];

            cart[`${pid}-${tidx}`] = {
                product: p,
                tier: t,
                tierLabel: String.fromCharCode(65 + tidx),
                quantity: t.moq  // 初始數量為最低購買量
            };

            document.getElementById('cartCount').textContent = Object.keys(cart).length;
            btn.textContent = '✓ 已加入';
            setTimeout(() => btn.textContent = '加入購物車', 1200);
        }

        // 刪除購物車商品
        function removeFromCart(key) {
            if (confirm('確定要移除這個商品嗎?')) {
                delete cart[key];
                document.getElementById('cartCount').textContent = Object.keys(cart).length;
                openCart();  // 重新渲染購物車
            }
        }

        // 更新商品數量
        function updateQuantity(key, newQty) {
            if (cart[key]) {
                const minQty = cart[key].tier.moq;
                cart[key].quantity = Math.max(minQty, newQty);
                openCart();  // 重新渲染購物車
            }
        }

        // 改變數量
        function changeQuantity(key, delta) {
            if (cart[key]) {
                const minQty = cart[key].tier.moq;
                const newQty = cart[key].quantity + delta;
                if (newQty >= minQty) {
                    cart[key].quantity = newQty;
                    openCart();
                }
            }
        }

        // 開啟購物車
        function openCart() {
            const items = Object.entries(cart);
            const total = items.reduce((s, [_, i]) => s + i.tier.price * i.quantity, 0);

            document.getElementById('cartItems').innerHTML = items.length === 0 ?
                '<div class="empty-cart">🛒 購物車是空的<br><br>快去選購商品吧！</div>' :
                `<div class="customer-info">
                    <h3>👤 客戶資訊</h3>
                    <div class="form-group">
                        <label>姓名 *</label>
                        <input type="text" id="customerName" value="${customerInfo.name}" placeholder="請輸入姓名" onchange="customerInfo.name = this.value">
                    </div>
                    <div class="form-group">
                        <label>電話 *</label>
                        <input type="tel" id="customerPhone" value="${customerInfo.phone}" placeholder="請輸入聯絡電話" onchange="customerInfo.phone = this.value">
                    </div>
                    <div class="form-group">
                        <label>地址</label>
                        <input type="text" id="customerAddress" value="${customerInfo.address}" placeholder="請輸入地址(選填)" onchange="customerInfo.address = this.value">
                    </div>
                    <div class="form-group">
                        <label>備註</label>
                        <textarea id="customerNote" placeholder="其他需求或備註(選填)" onchange="customerInfo.note = this.value">${customerInfo.note}</textarea>
                    </div>
                </div>` +
                items.map(([key, i]) => {
                    const totalPrice = i.tier.price * i.quantity;
                    return `
                    <div class="cart-item">
                        <div class="cart-item-header">
                            <div class="cart-item-name">${i.product.name} - ${i.tierLabel}組</div>
                            <button class="remove-item-btn" onclick="removeFromCart('${key}')">🗑️ 刪除</button>
                        </div>
                        <div class="cart-item-details">
                            📏 尺寸: ${i.product.size} | 💰 單價: NT$ ${i.tier.price.toLocaleString()}/${i.product.unit}
                        </div>
                        <div class="quantity-control">
                            <button class="quantity-btn" onclick="changeQuantity('${key}', -1)" ${i.quantity <= i.tier.moq ? 'disabled' : ''}>−</button>
                            <input type="number" class="quantity-input" value="${i.quantity}" min="${i.tier.moq}"
                                   onchange="updateQuantity('${key}', parseInt(this.value) || ${i.tier.moq})">
                            <button class="quantity-btn" onclick="changeQuantity('${key}', 1)">+</button>
                            <span style="color: #666; font-size: 0.85rem;">(最低 ${i.tier.moq} ${i.product.unit})</span>
                        </div>
                        <div class="cart-item-price">小計: NT$ ${totalPrice.toLocaleString()}</div>
                    </div>
                `}).join('') + `
                <div class="cart-total">總計: NT$ ${total.toLocaleString()}</div>
                <button class="checkout-btn" onclick="checkout()">✓ 確認訂單</button>
            `;

            document.getElementById('cartModal').classList.add('active');
        }

        // 關閉購物車
        function closeCart() {
            document.getElementById('cartModal').classList.remove('active');
        }

        // 結帳
        function checkout() {
            // 驗證客戶資訊
            if (!customerInfo.name.trim()) {
                alert('❌ 請填寫姓名');
                document.getElementById('customerName').focus();
                return;
            }
            if (!customerInfo.phone.trim()) {
                alert('❌ 請填寫聯絡電話');
                document.getElementById('customerPhone').focus();
                return;
            }

            const items = Object.values(cart);
            const total = items.reduce((s, i) => s + i.tier.price * i.quantity, 0);

            // 組合訂單文字
            let text = `🐟 魚樂匯訂單\n\n`;
            text += `👤 客戶資訊\n`;
            text += `姓名: ${customerInfo.name}\n`;
            text += `電話: ${customerInfo.phone}\n`;
            if (customerInfo.address.trim()) text += `地址: ${customerInfo.address}\n`;
            if (customerInfo.note.trim()) text += `備註: ${customerInfo.note}\n`;
            text += `\n───────────────────\n\n`;

            text += items.map(i => {
                const totalPrice = i.tier.price * i.quantity;
                return `${i.product.name} - ${i.tierLabel}組\n` +
                       `尺寸: ${i.product.size}\n` +
                       `數量: ${i.quantity} ${i.product.unit}\n` +
                       `單價: $${i.tier.price}/${i.product.unit}\n` +
                       `小計: $${totalPrice.toLocaleString()}`;
            }).join('\n\n');

            text += `\n\n───────────────────\n\n💰 總金額: NT$ ${total.toLocaleString()}\n\n`;
            text += `📅 訂單時間: ${new Date().toLocaleString('zh-TW')}`;

            document.getElementById('cartItems').innerHTML = `
                <div class="order-summary">
                    <h3>📋 訂單明細</h3>
                    <pre>${text}</pre>
                    <div class="action-buttons">
                        <button class="checkout-btn line-btn" onclick="sendToLineOA()">
                            💬 送出至 LINE 官方帳號
                        </button>
                    </div>
                    <p style="margin-top: 1rem; font-size: 0.9rem; color: #666; text-align: center;">
                        點擊後會開啟 LINE 並自動帶入訂單內容
                    </p>
                </div>
            `;

            // 儲存訂單文字
            window.currentOrder = text;
        }

        // 送出至 LINE 官方帳號
        async function sendToLineOA() {
            if (!window.currentOrder) return;

            const msg = window.currentOrder;
            const LINE_OA_ID = '@joyfulfish';  // 魚樂匯 LINE 官方帳號 ID

            // 先嘗試複製到剪貼簿（備用方案）
            let copied = false;
            try {
                await navigator.clipboard.writeText(msg);
                copied = true;
            } catch (err) {
                console.log('複製到剪貼簿失敗，但不影響 LINE 開啟');
            }

            // 使用 LINE OA Message 格式，直接跳轉到官方帳號並預填訊息
            const url = `https://line.me/R/oaMessage/${encodeURIComponent(LINE_OA_ID)}/?${encodeURIComponent(msg)}`;
            window.open(url, '_blank');

            // 提示客人
            setTimeout(() => {
                alert(copied
                    ? '✅ 已開啟 LINE 官方帳號\n\n訂單已自動帶入或已複製到剪貼簿\n請按送出鍵傳送訂單'
                    : '✅ 已開啟 LINE 官方帳號\n\n請在對話框中貼上訂單並送出');
            }, 500);
        }

        // 初始化頁面
        init();
    </script>
